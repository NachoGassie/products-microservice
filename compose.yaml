version: '3.8'

services:

  orders-service:
    build: ./ordersservice
    image: orders-service
    env_file:
      - ./ordersservice/.env
    ports:
      - "8081:8080"
    networks:
      - app-network
    depends_on:
      orders-db:
        condition: service_healthy

  products-service:
    build: ./productservice
    image: products-service
    env_file:
      - ./productservice/.env
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      products-db:
        condition: service_healthy

  products-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    networks:
      - app-network
    volumes:
      - products-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d productdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  orders-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    networks:
      - app-network
    volumes:
      - orders-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordersdb"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  app-network:

volumes:
  products-pgdata:
  orders-pgdata: