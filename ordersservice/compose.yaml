version: '3.8'

services:

  postgres-dev:
    image: postgres:18-alpine
    container_name: orders-db
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    networks:
      orders-network:
        aliases:
          - orders-dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordersdb"]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  orders-network:
volumes:
  pgdata: